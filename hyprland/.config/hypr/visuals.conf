source = ~/.cache/wal/hyprland-colors.conf

cursor {
  no_hardware_cursors = true
}

general { 
    gaps_in = 5
    gaps_out = 10

    border_size = 3

    col.active_border = $FG_COLOR $BG_COLOR $FG_COLOR 90deg
    col.inactive_border = $BG_COLOR

    # no_border_on_floating = true

    resize_on_border = true

    allow_tearing = false

    layout = dwindle
}

decoration {
    rounding = 12

    # active_opacity = 0.90
    # inactive_opacity = 0.80

    # drop_shadow = true
    # shadow_range = 4
    # shadow_render_power = 2
    # shadow_ignore_window = true
    # col.shadow = rgba(1a1a1aee)

    blur {
        enabled = true
        size = 6
        passes = 1
        ignore_opacity = true
        vibrancy = 0.1696
    }
}

# animations {
#     enabled = true
#     bezier = wind, 0.05, 0.9, 0.1, 1.05
#     bezier = winIn, 0.1, 1.1, 0.1, 1.1
#     bezier = winOut, 0.3, -0.3, 0, 1
#     bezier = liner, 0, 0, 0.1, 0.1
#     animation = windows, 1, 6, wind, slide
#     animation = windowsIn, 1, 6, winIn, slide
#     animation = windowsOut, 1, 5, winOut, slide
#     animation = windowsMove, 1, 5, wind, slide
#     # animation = border, 1, 1, default
#     # animation = borderangle, 1, 30, liner
#     animation = fade, 1, 10, default
#     animation = workspaces, 1, 5, wind
# }

animations {
  enabled = yes

  bezier = wind, 0.05, 0.9, 0.1, 1.05
  bezier = winIn, 0.1, 1.1, 0.1, 1.1
  bezier = winOut, 0.3, -0.3, 0, 1
  bezier = liner, 1, 1, 1, 1
  bezier = overshot, 0.05, 0.9, 0.1, 1.05
  bezier = smoothOut, 0.5, 0, 0.99, 0.99
  bezier = smoothIn, 0.5, -0.5, 0.68, 1.5
  
  animation = windows, 1, 6, wind, slide
  animation = windowsIn, 1, 5, winIn, slide
  animation = windowsOut, 1, 3, smoothOut, slide
  animation = windowsMove, 1, 5, wind, slide
  animation = border, 1, 1, liner
  #animation = borderangle, 1, 180, liner, loop #used by rainbow borders and rotating colors
  animation = fade, 1, 3, smoothOut
  animation = workspaces, 1, 5, overshot
  
  # animations for -git or version >0.42.0
  animation = workspacesIn, 1, 5, winIn, slide
  animation = workspacesOut, 1, 5, winOut, slide

  bezier = flashIn, 0.1, 1.1, 0.1, 1.1
  bezier = flashOut, 0.3, -0.3, 0, 1
  animation = hyprfocusIn, 1, 0.6, flashIn
  animation = hyprfocusOut, 1, 0.6, flashOut
}

plugin {
  hyprfocus {
    mode = flash
    bounce_strength = 0.55
    fade_opacity = 0.85
    slide_height = 20
  }
}
