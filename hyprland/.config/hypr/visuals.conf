# See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true
    preserve_split = true 
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
}

# layerrule = blur 1, match:namespace ^(logout_dialog)$
windowrule = opacity 0.95 0.8, match:class :^(.*)$
windowrule = opacity 1 0.92, match:class :^(google-chrome)$
windowrule = opacity 1 0.92, match:class :^(firefox)$
windowrule = opacity 1 0.92, match:class :^(org.godotengine.Editor)$
windowrule = opacity 1 0.9, match:class :^(kitty)$
windowrule = opacity 1 1, match:class :^(org.gnome.Totem)$
